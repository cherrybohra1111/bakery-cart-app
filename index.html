<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cherry's Bakery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Bakery Shop</h1>

        <div id="menu-box">
            <h2>~Menu~</h2>
            <div id="product-list"></div>
        </div>

        
        <div id="order-box">
            <h2>~Your Orders~</h2>
            <p id="no-orders">Your cart is empty.</p>
            <div id="orders"></div>
        </div>

        <div id="orders-total" class="hidden">
            <p>Total Cost:<span id="total-cost">$0.00</span></p>
            <button id="confirm-order">Confirm Order</button>
        </div>
        
    </div>
    
    <script src="script.js"></script>
</body>
</html>
